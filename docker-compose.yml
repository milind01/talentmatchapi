# version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: docai_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-docai_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (broker and cache)
  redis:
    image: redis:7-alpine
    container_name: docai_redis
    ports:
      # - "6379:6379"
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ollama - Local LLM (Free Alternative to OpenAI)
  ollama:
    image: ollama/ollama:latest
    container_name: docai_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_NUM_THREAD=4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
    # On first start, pull the model:
    # docker exec docai_ollama ollama pull mistral

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: docai_api
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/docai_db
      REDIS_URL: redis://redis:6379/0
      REDIS_BROKER_URL: redis://redis:6379/1
      REDIS_CACHE_URL: redis://redis:6379/2
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      # Ollama Configuration (replaces OpenAI)
      OLLAMA_BASE_URL: http://ollama:11434
      LLM_MODEL: ${LLM_MODEL:-mistral}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    command: python -m uvicorn src.api.main:app --host 0.0.0.0 --port 8001 --reload

  # Celery Worker
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: docai_worker
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/docai_db
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      # Ollama Configuration
      OLLAMA_BASE_URL: http://ollama:11434
      LLM_MODEL: ${LLM_MODEL:-mistral}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
    depends_on:
      - postgres
      - redis
      - ollama
      - api
    volumes:
      - ./src:/app/src

volumes:
  postgres_data:
  redis_data:
  ollama_data:
